<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a040f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#370617;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#ffba08" stroke-width="3"/>
  
  <!-- W letter -->
  <text x="50" y="68" 
        font-family="Georgia, serif" 
        font-size="55" 
        font-weight="bold" 
        fill="#ffba08" 
        text-anchor="middle"
        style="font-style: italic;">W</text>
  
  <!-- Decorative element - small graph line -->
  <polyline points="25,75 35,65 45,70 55,60 65,68 75,55" 
            fill="none" 
            stroke="#ffba08" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round"
            opacity="0.6"/>
</svg>